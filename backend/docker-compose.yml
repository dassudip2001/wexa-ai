version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: siem_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_broker
    restart: always
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: django_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      DB_NAME: siem_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0

  celery_worker:
    build: .
    container_name: celery_worker
    command: celery -A backend worker -l info
    volumes:
      - .:/app
    depends_on:
      - web
      - redis
      - postgres
    environment:
      REDIS_URL: redis://redis:6379/0

  celery_beat:
    build: .
    container_name: celery_beat
    command: celery -A backend beat -l info
    volumes:
      - .:/app
    depends_on:
      - redis
      - postgres
    environment:
      REDIS_URL: redis://redis:6379/0

volumes:
  postgres_data:
